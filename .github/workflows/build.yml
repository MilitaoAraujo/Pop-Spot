name: Build Windows

# Dispara ao publicar uma tag (ex: v1.0.0) ou manualmente pelo GitHub
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar MSYS2 + GTK3 + Python
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-gobject
            mingw-w64-x86_64-gtk3
            mingw-w64-x86_64-python-requests
            mingw-w64-x86_64-python-numpy
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-python-cffi
            mingw-w64-x86_64-python-setuptools
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Instalar dependencias pip
        shell: msys2 {0}
        run: pip install pyinstaller pyinstaller-hooks-contrib soundcard --break-system-packages

      - name: Build executavel
        shell: msys2 {0}
        run: |
          TYPELIB=$(cygpath -w /mingw64/lib/girepository-1.0)
          pyinstaller main.py \
            --name PopSpot \
            --windowed \
            --onedir \
            --noconfirm \
            --runtime-hook _gi_hook.py \
            --collect-all gi \
            --hidden-import gi.repository.Gtk \
            --hidden-import gi.repository.Gdk \
            --hidden-import gi.repository.GLib \
            --hidden-import gi.repository.GObject \
            --hidden-import gi.repository.Pango \
            --hidden-import gi.repository.GdkPixbuf \
            --hidden-import cairo \
            --hidden-import requests \
            --hidden-import numpy \
            --hidden-import soundcard \
            --add-data "${TYPELIB}:girepository-1.0"

      - name: Copiar pasta config
        run: Copy-Item -Path config -Destination dist\PopSpot\config -Recurse -Force

      - name: Extrair versao da tag
        id: ver
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          if (-not $version) { $version = "1.0.0" }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Instalar Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Gerar instalador (.exe)
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc setup.iss "/DAppVersion=${{ steps.ver.outputs.VERSION }}"

      - name: Compactar bundle portatil (zip alternativo)
        run: Compress-Archive -Path dist\PopSpot\* -DestinationPath PopSpot-Portatil.zip

      - name: Upload como artefato
        uses: actions/upload-artifact@v4
        with:
          name: PopSpot-Windows
          path: |
            dist/PopSpot-Setup.exe
            PopSpot-Portatil.zip
          retention-days: 30

      - name: Publicar no GitHub Releases (somente em tags v*)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/PopSpot-Setup.exe
            PopSpot-Portatil.zip
          generate_release_notes: true
